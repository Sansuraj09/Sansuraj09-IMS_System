services:
  postgres:
    image: postgres:15
    container_name: ims-postgres
    environment:
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
      POSTGRES_DB: ims_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ims_network

  mongo:
    image: mongo:6
    container_name: ims-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ims_network

  redis:
    image: redis:7
    container_name: ims-redis
    ports:
      - "6379:6379"
    networks:
      - ims_network

  backend:
    build: ./backend
    container_name: ims-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://ims:ims@postgres:5432/ims_db
      MONGO_URL: mongodb://mongo:27017
      REDIS_HOST: redis
    networks:
      - ims_network

  worker:
    build: ./worker
    container_name: ims-worker
    depends_on:
      - redis
      - mongo
    environment:
      REDIS_HOST: redis
      MONGO_URL: mongodb://mongo:27017
    networks:
      - ims_network

  frontend:
    build: ./frontend
    container_name: ims-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - ims_network

volumes:
  postgres_data:
  mongo_data:

networks:
  ims_network:
